<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG 澳門實境探索地圖 v1.2.09</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body, #map-container {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #111;
        }
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* 🌫️ 全螢幕畫布迷霧 */
        #fog-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;            
            pointer-events: none;  
            opacity: 0.85;         
        }

        /* 💬 頂層白色文字對話框 */
        #location-bubble {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;             
            background: #ffffff;       
            color: #222222;            
            padding: 12px 24px;
            border-radius: 20px;       
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 4px solid #202190; 
            min-width: 260px;
            max-width: 85%;            
            pointer-events: none;      
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .street-zh {
            font-size: 18px;
            font-weight: bold;
            color: #111111;
        }
        .street-pt {
            font-size: 13px;           
            font-weight: 500;
            color: #666666;            
            font-style: italic;
            line-height: 1.2;
        }

        /* 📍 右側功能按鈕欄 */
        .action-buttons-container {
            position: absolute;
            right: 16px;
            top: 110px;                
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .circle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            user-select: none;
        }

        /* 🕹️ D-Pad 介面 */
        #dpad-container {
            position: absolute;
            bottom: 275px; 
            right: 16px;
            z-index: 1000;
            display: none; 
            grid-template-columns: repeat(3, 45px);
            grid-template-rows: repeat(3, 45px);
            gap: 5px;
        }
        .dpad-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: 2px solid #666;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .dpad-btn:active {
            background: #ff9800;
            color: white;
        }
        .dpad-empty {
            pointer-events: none;
        }

        /* 狀態與控制面板 */
        #status-panel {
            position: absolute;
            bottom: 25px;         
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.88);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-family: sans-serif;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 310px;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }
        
        .panel-btn {
            padding: 7px 4px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            color: white;
        }
        .btn-mode-gps { background: #2196F3; }
        .btn-mode-dpad { background: #9c27b0; }
        .btn-io-download { background: #4CAF50; }
        .btn-io-upload { background: #FF9800; }
        .btn-power-high { background: #e91e63; grid-column: span 2; }
        .btn-power-save { background: #009688; grid-column: span 2; }
        .btn-danger { background: #ff4d4d; grid-column: span 2; margin-top: 2px;}

        /* 🌟 V1.2.09 新增：唯讀模式專用的巨大黃金遊戲召集連結 */
        #join-game-banner {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1005;
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: white;
            padding: 16px 32px;
            border-radius: 30px;
            font-family: system-ui, sans-serif;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(255,87,34,0.5);
            display: none; /* 預設隱藏，只有唯讀模式會被程式強行打開 */
            animation: pulse 2s infinite;
            border: 2px solid #fff;
            white-space: nowrap;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.04); box-shadow: 0 12px 30px rgba(255,87,34,0.7); }
            100% { transform: translateX(-50%) scale(1); }
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
        <canvas id="fog-canvas"></canvas>
    </div>

    <div id="location-bubble">
        <span class="street-zh" id="bubble-zh">📍 正在尋找GPS訊號...</span>
        <span class="street-pt" id="bubble-pt">Procura sinal de GPS...</span>
    </div>

    <div class="action-buttons-container">
        <button class="circle-btn" onclick="recenterMap()">📍</button>
        <button class="circle-btn" onclick="shareAsReadOnlyUrl()">📤</button>
    </div>

    <div id="dpad-container">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" onclick="movePlayerSimulated('UP')">🔼</button>
        <div class="dpad-empty"></div>
        
        <button class="dpad-btn" onclick="movePlayerSimulated('LEFT')">◀️</button>
        <div class="dpad-btn" style="background: #9c27b0; color: white; font-size: 14px;">🕹️</div>
        <button class="dpad-btn" onclick="movePlayerSimulated('RIGHT')">▶️</button>
        
        <div class="dpad-empty"></div>
        <button class="dpad-btn" onclick="movePlayerSimulated('DOWN')">🔽</button>
        <div class="dpad-empty"></div>
    </div>

    <input type="file" id="file-selector" accept=".json" onchange="uploadSaveFile(event)" style="display: none;">

    <a href="#" id="join-game-banner" onclick="redirectToPureGame(event)">✨ 我也要加入澳門實境探索！</a>

    <div id="status-panel">
        <div id="panel-title" style="font-weight: bold; font-size: 15px; color: #ff9800; margin-bottom: 4px;">🗺️ 澳門探索地圖 (v1.2.09) 📸</div>
        <div id="gps-status" style="font-size: 12px; min-height: 32px;">定位中...</div>
        
        <div class="btn-group" id="control-buttons-wrapper">
            <button id="btn-toggle-mode" class="panel-btn btn-mode-gps" onclick="toggleControlMode()">切換模式：🛰️ GPS</button>
            <button id="btn-toggle-power" class="panel-btn btn-power-high" onclick="togglePowerMode()">運行模式：⚡ 高效能模式</button>
            <button class="panel-btn btn-io-download" onclick="downloadSaveFile()">💾 下載目前進度</button>
            <button class="panel-btn btn-io-upload" onclick="triggerUploadClick()">📂 上載既有進度</button>
            <button class="panel-btn btn-danger" onclick="resetGame()">🛑 清空全部紀錄</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-geometryutil@0.10.3/src/leaflet.geometryutil.js"></script>
    
    <script>
        const macauBounds = L.latLngBounds(
            L.latLng(22.0900, 113.5000), 
            L.latLng(22.2300, 113.6200)  
        );

        let currentLat = 22.19746;
        let currentLng = 113.549086;
        let hasInitialPosition = false; 
        let unlockedPaths = []; 
        let playerMarker = null; 
        
        let isDpadMode = false; 
        let isPowerSaveMode = false; 
        let isReadOnlyMode = false; // 🌟 V1.2.09 狀態鎖：標記目前是否處於唯讀觀戰狀態
        let watchId = null;     
        let lastApiRequestTime = 0;
        const stepSize = 0.00015; 

        const map = L.map('map', {
            zoomControl: false,          
            maxBounds: macauBounds,       
            maxBoundsViscosity: 1.0,     
            minZoom: 14,                  
            maxZoom: 19                   
        }).setView([currentLat, currentLng], 17); 

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            tempCanvas.width = window.innerWidth;
            tempCanvas.height = window.innerHeight;
            drawFog(); 
        }
        window.addEventListener('resize', resizeCanvas);

        // 雙層迷霧混合演算
        function drawFog() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (unlockedPaths.length === 0) return;

            const centerLatLng = map.getCenter();
            const centerScreenPos = map.latLngToContainerPoint(centerLatLng);

            const radius80LatLng = L.GeometryUtil.destination(centerLatLng, 0, 80);
            const radius80ScreenPos = map.latLngToContainerPoint(radius80LatLng);
            const pixels80 = Math.abs(centerScreenPos.y - radius80ScreenPos.y);

            const radius50LatLng = L.GeometryUtil.destination(centerLatLng, 0, 50);
            const radius50ScreenPos = map.latLngToContainerPoint(radius50LatLng);
            const pixels50 = Math.abs(centerScreenPos.y - radius50ScreenPos.y);

            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.fillStyle = '#000000';
            tempCtx.globalAlpha = 1.0; 
            unlockedPaths.forEach(coord => {
                const screenPos = map.latLngToContainerPoint([coord[0], coord[1]]);
                tempCtx.beginPath();
                tempCtx.arc(screenPos.x, screenPos.y, pixels80, 0, Math.PI * 2);
                tempCtx.fill();
            });
            ctx.globalCompositeOperation = 'destination-out';
            ctx.globalAlpha = 0.45; 
            ctx.drawImage(tempCanvas, 0, 0);

            ctx.globalAlpha = 1.0; 
            unlockedPaths.forEach(coord => {
                const screenPos = map.latLngToContainerPoint([coord[0], coord[1]]);
                ctx.beginPath();
                ctx.arc(screenPos.x, screenPos.y, pixels50, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.globalCompositeOperation = 'source-over';
        }

        function setupMapRenderListeners() {
            map.off('move', drawFog);
            map.off('moveend', drawFog);
            if (isPowerSaveMode) {
                map.on('moveend', drawFog);
            } else {
                map.on('move', drawFog);
            }
            map.on('zoomend', drawFog);
        }

        function togglePowerMode() {
            if (isReadOnlyMode) return;
            isPowerSaveMode = !isPowerSaveMode;
            const powerBtn = document.getElementById('btn-toggle-power');
            if (isPowerSaveMode) {
                powerBtn.innerText = "運行模式：🔋 省電模式";
                powerBtn.className = "panel-btn btn-power-save";
            } else {
                powerBtn.innerText = "運行模式：⚡ 高效能模式";
                powerBtn.className = "panel-btn btn-power-high";
            }
            setupMapRenderListeners();
            drawFog();
        }

        // Overpass API 街區雷達
        async function updateStreetOverpass(lat, lng) {
            const currentTime = Date.now();
            if (currentTime - lastApiRequestTime < 4000) return; 
            lastApiRequestTime = currentTime;

            try {
                const overpassQL = `[out:json];way(around:30,${lat},${lng})[highway];out tags;`;
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQL)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                let streetZHs = [];
                let streetPTs = [];

                if (data && data.elements) {
                    data.elements.forEach(element => {
                        if (element.tags) {
                            const nameZH = element.tags['name:zh'] || element.tags['name:zh_tw'] || element.tags['name:zh-TW'] || element.tags['name'];
                            const namePT = element.tags['name:pt'] || element.tags['official_name:pt'] || element.tags['official_name'];

                            if (nameZH && !streetZHs.includes(nameZH) && isChinese(nameZH)) streetZHs.push(nameZH);
                            if (namePT && !streetPTs.includes(namePT) && !isChinese(namePT)) streetPTs.push(namePT);
                        }
                    });
                }

                if (streetZHs.length > 0) {
                    document.getElementById('bubble-zh').innerText = isReadOnlyMode ? `👀 好友目前在 ${streetZHs.join(' 與 ')}` : `📍 你目前在 ${streetZHs.join(' 與 ')}`;
                    document.getElementById('bubble-pt').innerText = streetPTs.length > 0 ? streetPTs.join(' / ') : "Macau";
                } else {
                    document.getElementById('bubble-zh').innerText = isReadOnlyMode ? `👀 正在觀看好友的歷史足跡` : `📍 探索歷史城區中...`;
                    document.getElementById('bubble-pt').innerText = `Explorando o centro histórico`;
                }
            } catch (error) {
                console.error("Overpass 出錯:", error);
            }
        }

        function isChinese(str) { return /[\u4e00-\u9fa5]/.test(str); }

        // 🌟【V1.2.09 核心優化：打包生成唯讀分享連結】
        function shareAsReadOnlyUrl() {
            if (unlockedPaths.length === 0) {
                alert("目前地圖上一片空白，快去走走再分享吧！");
                return;
            }

            // 1. 高效數據精簡：將座標壓縮為 lat,lng 並保留5位小數，用分號隔開
            const compressedCoordinates = unlockedPaths.map(coord => {
                return `${coord[0].toFixed(5)},${coord[1].toFixed(5)}`;
            }).join(';');

            // 2. 組裝帶有參數的完整網址
            const baseUrl = window.location.origin + window.location.pathname;
            const finalShareUrl = `${baseUrl}?data=${encodeURIComponent(compressedCoordinates)}`;

            // 3. 複製到手機剪貼簿 (調用現代瀏覽器 Clipboard API)
            navigator.clipboard.writeText(finalShareUrl).then(() => {
                alert("🔗 唯讀觀戰連結已成功複製到剪貼簿！\n快分享給好友，讓他們見證你的開荒進度吧！");
            }).catch(err => {
                // 備用方案：如果瀏覽器安全權限不允許自動複製，直接彈窗讓玩家手動複製
                prompt("手機不允許自動複製，請手動複製以下專屬連結：", finalShareUrl);
            });
        }

        // 🌟【V1.2.09 核心優化：網頁啟動時的網址參數解碼引擎】
        function checkUrlParametersEngine() {
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedData = urlParams.get('data');

            if (encryptedData) {
                // 🚨 啟動唯讀觀戰狀態
                isReadOnlyMode = true;
                
                try {
                    const decodedText = decodeURIComponent(encryptedData);
                    const coordStringArray = decodedText.split(';');
                    
                    unlockedPaths = coordStringArray.map(str => {
                        const parts = str.split(',');
                        return [parseFloat(parts[0]), parseFloat(parts[1])];
                    });

                    if (unlockedPaths.length > 0) {
                        const lastPoint = unlockedPaths[unlockedPaths.length - 1];
                        currentLat = lastPoint[0];
                        currentLng = lastPoint[1];
                    }

                    // 調整介面：隱藏底部的所有開發/修改按鈕
                    document.getElementById('control-buttons-wrapper').style.display = "none";
                    document.getElementById('panel-title').innerText = "👁️ 好友進度瀏覽中 (唯讀模式) 👁️";
                    document.getElementById('gps-status').innerHTML = `本檔案共內含 ${unlockedPaths.length} 個已除霧足跡<br>點擊下方按鈕開始你自己的冒險！`;
                    
                    // 秀出炫目巨大的召集令按鈕
                    document.getElementById('join-game-banner').style.display = "block";

                    // 在地圖上擺放好友的位置標記
                    playerMarker = L.marker([currentLat, currentLng]).addTo(map);
                    map.setView([currentLat, currentLng], 17);
                    
                    drawFog();
                    updateStreetOverpass(currentLat, currentLng);

                } catch (e) {
                    alert("❌ 觀戰連結解析失敗，網址可能已被毀損！已自動切換回正常遊戲模式。");
                    isReadOnlyMode = false;
                    window.location.href = window.location.origin + window.location.pathname; // 強制洗掉網址
                }
                return true; // 代表已被網址接管
            }
            return false; // 代表是正常玩家自己打開
        }

        // 🌟【V1.2.09 核心優化：點擊黃金連結，一鍵參戰】
        function redirectToPureGame(event) {
            event.preventDefault();
            // 直接去除所有網址後缀參數，還原乾淨的遊戲大廳
            const pureGameUrl = window.location.origin + window.location.pathname;
            window.location.href = pureGameUrl;
        }

        // 下載 JSON 檔案
        function downloadSaveFile() {
            if (isReadOnlyMode) return;
            if (unlockedPaths.length === 0) {
                alert("目前地圖上沒有任何除霧進度可以下載！");
                return;
            }
            const saveData = {
                gameIdentity: "Macau-Fog-Map-RPG",
                version: "1.2.09",
                downloadTimestamp: new Date().toISOString(),
                lastLocation: [currentLat, currentLng],
                exploredPaths: unlockedPaths 
            };
            const jsonText = JSON.stringify(saveData, null, 2);
            const blob = new Blob([jsonText], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            const today = new Date().toISOString().slice(0, 10);
            link.download = `macau_fog_save_${today}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function triggerUploadClick() { if(!isReadOnlyMode) document.getElementById('file-selector').click(); }

        // 解析玩家上傳檔案
        function uploadSaveFile(event) {
            if (isReadOnlyMode) return;
            const uploadedFile = event.target.files[0];
            if (!uploadedFile) return;

            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (parsedData.gameIdentity !== "Macau-Fog-Map-RPG") {
                        alert("❌ 格式不符：此檔案並非有效的澳門實境探索遊戲存檔！");
                        return;
                    }

                    unlockedPaths = parsedData.exploredPaths;
                    if (parsedData.lastLocation) {
                        currentLat = parsedData.lastLocation[0];
                        currentLng = parsedData.lastLocation[1];
                    }

                    localStorage.setItem('rpg_map_progress_v12', JSON.stringify(unlockedPaths));
                    localStorage.setItem('rpg_map_last_latlng', JSON.stringify([currentLat, currentLng]));

                    if (!playerMarker) {
                        playerMarker = L.marker([currentLat, currentLng]).addTo(map);
                    } else {
                        playerMarker.setLatLng([currentLat, currentLng]);
                    }
                    map.setView([currentLat, currentLng], 17);
                    
                    drawFog();
                    updateStreetOverpass(currentLat, currentLng);
                    updateStatusUI(0);
                    alert(`🎉 上載成功！已成功加載檔案中 ${unlockedPaths.length} 個已探索足跡！`);
                } catch (err) {
                    alert("❌ 檔案解析失敗！");
                }
            };
            fileReader.readAsText(uploadedFile);
        }

        function autoLoadSavedProgress() {
            const savedData = localStorage.getItem('rpg_map_progress_v12');
            if (savedData) {
                unlockedPaths = JSON.parse(savedData);
                if (unlockedPaths.length > 0) {
                    const lastPoint = unlockedPaths[unlockedPaths.length - 1];
                    currentLat = lastPoint[0];
                    currentLng = lastPoint[1];
                }
            }
        }

        // 雙模切換
        function toggleControlMode() {
            if (isReadOnlyMode) return;
            isDpadMode = !isDpadMode;
            const toggleBtn = document.getElementById('btn-toggle-mode');
            const dpadBox = document.getElementById('dpad-container');

            if (isDpadMode) {
                toggleBtn.innerText = "切換模式：🕹️ D-Pad";
                toggleBtn.className = "panel-btn btn-mode-dpad";
                dpadBox.style.display = "grid"; 
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                if (!playerMarker) playerMarker = L.marker([currentLat, currentLng]).addTo(map);
                hasInitialPosition = true;
                updateStatusUI(0);
                handleUnlock(currentLat, currentLng);
            } else {
                toggleBtn.innerText = "切換模式：🛰️ GPS";
                toggleBtn.className = "panel-btn btn-mode-gps";
                dpadBox.style.display = "none"; 
                startGpsTracking();
            }
        }

        // D-Pad 模擬移動
        function movePlayerSimulated(direction) {
            if (!isDpadMode || isReadOnlyMode) return;
            let nextLat = currentLat;
            let nextLng = currentLng;

            switch(direction) {
                case 'UP':    nextLat += stepSize; break;
                case 'DOWN':  nextLat -= stepSize; break;
                case 'LEFT':  nextLng -= stepSize; break;
                case 'RIGHT': nextLng += stepSize; break;
            }

            if (macauBounds.contains(L.latLng(nextLat, nextLng))) {
                currentLat = nextLat;
                currentLng = nextLng;
                playerMarker.setLatLng([currentLat, currentLng]);
                map.panTo([currentLat, currentLng]); 
                updateStatusUI(0);
                handleUnlock(currentLat, currentLng);
            }
        }

        function onLocationSuccess(position) {
            if (isDpadMode || isReadOnlyMode) return; 
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            if (!macauBounds.contains(L.latLng(lat, lng))) {
                document.getElementById('gps-status').innerHTML = `⚠️ 您不在澳門邊界內`;
                return;
            }

            currentLat = lat;
            currentLng = lng;
            hasInitialPosition = true;

            updateStatusUI(accuracy);

            if (!playerMarker) {
                map.setView([currentLat, currentLng], 17); 
                playerMarker = L.marker([currentLat, currentLng]).addTo(map);
            } else {
                playerMarker.setLatLng([currentLat, currentLng]);
            }

            handleUnlock(currentLat, currentLng);
        }

        function onLocationError(error) {
            if (!isDpadMode && !isReadOnlyMode) document.getElementById('gps-status').innerText = `📡 GPS訊號搜尋中...`;
        }

        function startGpsTracking() {
            if (isReadOnlyMode) return;
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(onLocationSuccess, onLocationError, {
                    enableHighAccuracy: true, 
                    timeout: 10000,           
                    maximumAge: 0             
                });
            }
        }

        function updateStatusUI(accuracy) {
            if (isReadOnlyMode) return;
            if (isDpadMode) {
                document.getElementById('gps-status').innerHTML = `🕹️ 模擬位置: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}<br>模式：沙盒測試中 (GPS暫停定位)`;
            } else {
                document.getElementById('gps-status').innerHTML = `🛰️ 實時位置: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}<br>誤差值: ${accuracy.toFixed(1)} 米 (GPS定位中)`;
            }
        }

        function recenterMap() {
            if (hasInitialPosition || isReadOnlyMode) map.setView([currentLat, currentLng], 17, { animate: true, duration: 1.0 });
        }

        function handleUnlock(lat, lng) {
            if (isReadOnlyMode) return; // 唯讀模式不允許產生新腳印
            let shouldUnlock = true;
            if (unlockedPaths.length > 0) {
                const lastPoint = unlockedPaths[unlockedPaths.length - 1];
                const distance = L.latLng(lastPoint[0], lastPoint[1]).distanceTo(L.latLng(lat, lng));
                if (distance <= 10) shouldUnlock = false; 
            }

            if (shouldUnlock) {
                unlockedPaths.push([lat, lng]);
                localStorage.setItem('rpg_map_progress_v12', JSON.stringify(unlockedPaths));
                drawFog();
                updateStreetOverpass(lat, lng);
            }
        }

        function resetGame() {
            if (isReadOnlyMode) return;
            if (confirm("🚨 警告！這將會清空所有的數據，確定嗎？")) {
                localStorage.removeItem('rpg_map_progress_v12');
                localStorage.removeItem('rpg_map_last_latlng');
                location.reload();
            }
        }

        // 🚀 V1.2.09 啟動核心群
        resizeCanvas(); 
        setupMapRenderListeners();

        // 1. 優先檢查是不是從別人的分享連結點進來的
        const hasBeenInterceptedByUrl = checkUrlParametersEngine();

        // 2. 如果是正常的本機玩家，執行常規的 GPS 啟動與本地存檔載入
        if (!hasBeenInterceptedByUrl) {
            autoLoadSavedProgress();
            startGpsTracking();
        }
    </script>
</body>
</html>
